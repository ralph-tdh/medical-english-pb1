<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Medical English · PocketBook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#FFFCF5;-webkit-text-size-adjust:100%;min-height:100vh}
    body,button{font-family:'Nunito',system-ui,sans-serif}
    h1,h2,.hf{font-family:'Baloo 2',system-ui,sans-serif}
    @keyframes popIn{0%{transform:scale(.85);opacity:0}65%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
    @keyframes slideU{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes wobble{0%,100%{transform:rotate(-1.5deg)}50%{transform:rotate(1.5deg)}}
    .pop{animation:popIn .38s cubic-bezier(.34,1.56,.64,1) both}
    .su{animation:slideU .35s ease both}
    .wobble{animation:wobble 2.5s ease-in-out infinite}
    .mbtn{
      width:100%;padding:13px 16px;border:2.5px solid #2A2A2A;border-radius:14px;
      font-family:'Nunito',system-ui,sans-serif;font-size:15px;font-weight:900;
      cursor:pointer;box-shadow:4px 4px 0 #2A2A2A;
      -webkit-appearance:none;appearance:none;display:block;text-align:center;
      transition:transform .1s,box-shadow .1s;
    }
    .mbtn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #2A2A2A}
    .obtn{
      width:100%;padding:11px;border:2px solid #BBB;border-radius:14px;
      font-family:'Nunito',system-ui,sans-serif;font-size:14px;font-weight:700;
      cursor:pointer;background:transparent;color:#888;
      box-shadow:3px 3px 0 #DDD;margin-top:9px;
      -webkit-appearance:none;appearance:none;
      transition:transform .1s,box-shadow .1s;
    }
    .obtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #DDD}
    .opt{
      width:100%;text-align:left;padding:12px 14px;
      border:2.5px solid #2A2A2A;border-radius:13px;background:#fff;cursor:pointer;
      font-family:'Nunito',system-ui,sans-serif;font-size:14px;font-weight:700;color:#2A2A2A;
      box-shadow:3px 3px 0 #2A2A2A;display:flex;align-items:center;gap:10px;
      margin-bottom:9px;line-height:1.5;-webkit-appearance:none;appearance:none;
      transition:transform .1s,box-shadow .1s;
    }
    .opt:not(.locked):active{transform:translate(2px,2px);box-shadow:1px 1px 0 #2A2A2A}
    .opt.ok{border-color:#1CB897!important;background:#E4FAF4!important;box-shadow:3px 3px 0 #1CB897!important;color:#0A7A60!important}
    .opt.no{border-color:#E84D6A!important;background:#FEF0F4!important;box-shadow:3px 3px 0 #E84D6A!important;color:#A82040!important}
    .opt.locked{cursor:default}
    .opt.dim{opacity:.45}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#DDD;border-radius:4px}
    #app{min-height:100vh;background:#FFFCF5}
  </style>
</head>
<body>
<div id="app"></div>

<!-- Loader: reads ?lesson=<id>, fetches lessons/<id>.json, then boots the engine.
     Falls back to an inline <script id="lesson-data"> block if present (standalone build). -->
<script>
(function () {
  function boot() {
    var s = document.createElement('script');
    s.src = 'engine.js';
    document.body.appendChild(s);
  }
  function fail(msg) {
    document.getElementById('app').innerHTML =
      '<div style="max-width:460px;margin:40px auto;padding:24px;font-family:sans-serif;color:#A82040;line-height:1.6">'
      + '<b>Could not load lesson.</b><br>' + msg
      + '<br><br><span style="color:#888;font-size:13px">Tip: open via a local server '
      + '(<code>python -m http.server</code>) or use the standalone build — '
      + 'browsers block <code>fetch()</code> over <code>file://</code>.</span></div>';
  }

  // 1) Standalone build: lesson JSON already inlined.
  var inline = document.getElementById('lesson-data');
  if (inline) {
    try { window.LESSON = JSON.parse(inline.textContent); boot(); return; }
    catch (e) { return fail('Inline lesson JSON is invalid: ' + e.message); }
  }

  // 2) Hosted build: fetch the lesson file by id.
  var params = new URLSearchParams(window.location.search);
  var id = params.get('lesson') || 'pb1';
  fetch('lessons/' + id + '.json')
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function (data) { window.LESSON = data; boot(); })
    .catch(function (e) { fail('lessons/' + id + '.json — ' + e.message); });
})();
</script>
</body>
</html>
